<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AI戰艦 Pro Max v4.9（共振最終版）</title>
<style>
body{
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container{padding:20px;}
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}
button{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}
.primary{background:#00c3ff;color:#000;}
.danger{background:#ff4444;}
textarea{width:100%;height:120px;background:#111;color:#fff;}
input{background:#111;color:#fff;}
.grade{font-size:20px;font-weight:bold;}
</style>
</head>

<body>
<div class="container">

<h1>🚀 AI戰艦 Pro Max v4.9</h1>

<div class="card">
<h3>CSV輸入</h3>
<textarea id="csvInput"></textarea>
<button class="primary" onclick="analyze()">開始分析</button>
</div>

<div class="card">
<h3>AI覆蓋</h3>
<textarea id="aiInput"></textarea>
<button onclick="parseAI()">解析AI</button>
</div>

<div class="card">
<h3>結果</h3>
<div id="result"></div>
</div>

</div>

<script>

let localPicks=[]
let aiCodes=[]
let finalPicks=[]
let maxDev=15

function analyze(){
  const txt=document.getElementById('csvInput').value
  const rows=txt.split('\n').slice(1)

  localPicks=rows.map(r=>{
    const c=r.split(',')
    const price=parseFloat(c[2])
    const sma20=parseFloat(c[16])
    const dev=((price-sma20)/sma20)*100

    return {
      symbol:c[0],
      name:c[1],
      price,
      sma20,
      dev,
      score:100-dev
    }
  }).sort((a,b)=>b.score-a.score)

  render()
}

function parseAI(){
  const txt=document.getElementById('aiInput').value
  const raw=txt.match(/\d{4,6}/g)||[]

  const valid=new Set(localPicks.map(x=>x.symbol))

  aiCodes=[...new Set(raw.filter(c=>{
    const s=localPicks.find(x=>x.symbol==c)
    return valid.has(c)&&(!s.dev||s.dev<=maxDev)
  }))].slice(0,2)

  render()
}

function getGrade(s){
  const inLocal=localPicks.slice(0,2).some(x=>x.symbol==s.symbol)
  const inAI=aiCodes.includes(s.symbol)

  if(s.dev>maxDev) return {g:'D',t:'🚨禁追'}

  if(inLocal&&inAI) return {g:'S+',t:'🔥共振'}
  if(inLocal) return {g:'A',t:'📊本地'}
  if(inAI) return {g:'B',t:'🧠AI'}

  return {g:'D',t:'淘汰'}
}

function decide(){
  const ranked=localPicks.map(s=>{
    const g=getGrade(s)
    let sc=s.score

    if(g.g=='S+') sc+=50
    if(g.g=='A') sc+=20
    if(g.g=='B') sc+=5
    if(g.g=='D') sc-=100

    return {...s,finalScore:sc,grade:g}
  }).sort((a,b)=>b.finalScore-a.finalScore)

  finalPicks=ranked.slice(0,2)
}

function render(){
  decide()

  const box=document.getElementById('result')
  box.innerHTML=''

  finalPicks.forEach(s=>{
    const g=s.grade

    const color={
      'S+':'#00ffcc',
      'A':'#66ccff',
      'B':'#ffcc00',
      'D':'#ff4444'
    }[g.g]

    box.innerHTML+=`
      <div class="card">
        <div>${s.symbol} ${s.name}</div>
        <div class="grade" style="color:${color}">
          ${g.g}（${g.t}）
        </div>
        <div>乖離：${s.dev.toFixed(2)}%</div>
      </div>
    `
  })
}

</script>
</body>
</html>
