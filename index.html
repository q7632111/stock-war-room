<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07111f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>AI 戰艦系統</title>

<style>
:root{
  --bg:#07111f;
  --panel:#0f1b33;
  --line:rgba(255,255,255,.08);
  --text:#eef5ff;
  --muted:#93a8cf;
  --blue:#60a5fa;
  --cyan:#67e8f9;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden; /* 🔥 關鍵：鎖住整個頁面 */
  font-family:-apple-system;
  background:linear-gradient(180deg,#07111f,#0b1730);
  color:var(--text);
}

/* 🔥 外層戰艦容器 */
.app{
  height:100%;
  display:flex;
  flex-direction:column;
}

/* 🔥 固定指揮艙（不會被蓋） */
.header{
  flex-shrink:0;
  padding:14px;
  background:rgba(10,20,40,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}

.title{
  font-weight:900;
  font-size:16px;
}

.sub{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* 🔥 內容區改成內部滾動 */
.content{
  flex:1;
  overflow:auto; /* 🔥 只有這裡會滾 */
  padding:14px;
}

/* 卡片 */
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin-bottom:14px;
}

textarea{
  width:100%;
  min-height:100px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#081224;
  color:white;
  padding:10px;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:900;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
}

/* 狀態區 */
.status{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#081224;
  padding:10px;
  border-radius:12px;
}

.box .k{
  font-size:11px;
  color:var(--muted);
}

.box .v{
  font-size:18px;
  font-weight:900;
  margin-top:4px;
}

</style>
</head>

<body>

<div class="app">

  <!-- 🔥 固定區（不會被Safari壓） -->
  <div class="header">
    <div class="title">🛸 戰艦指揮艙</div>
    <div class="sub">這個區塊永遠固定，不會被上方白條影響</div>
  </div>

  <!-- 🔥 滾動區 -->
  <div class="content">

    <div class="card">
      <div class="status">
        <div class="box">
          <div class="k">本地</div>
          <div class="v">—</div>
        </div>
        <div class="box">
          <div class="k">AI</div>
          <div class="v">—</div>
        </div>
        <div class="box">
          <div class="k">最終</div>
          <div class="v">—</div>
        </div>
        <div class="box">
          <div class="k">警報</div>
          <div class="v">待命</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:900;margin-bottom:8px">CSV選股</div>
      <textarea placeholder="貼CSV"></textarea>
      <button>開始分析</button>
    </div>

    <div class="card">
      <div style="font-weight:900;margin-bottom:8px">AI覆蓋</div>
      <textarea placeholder="貼AI結果"></textarea>
      <button>解析</button>
    </div>

    <div class="card">
      <div style="font-weight:900;margin-bottom:8px">持倉監控</div>
      <textarea placeholder="輸入資料"></textarea>
      <button>加入</button>
    </div>

  </div>
</div>

</body>
</html>
