<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飛輪投資系統｜控制中心</title>

<style>
body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg,#0b0f1a,#111827);
  color:#e5e7eb;
}

/* ===== 控制中心 ===== */
.control-center{
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.title{
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
  color:#60a5fa;
}

.btn-group{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{
  transform: translateY(-2px);
}

.btn-main{
  background:#22c55e;
  color:#000;
}

.btn-attack{
  background:#ef4444;
  color:#fff;
}

.btn-data{
  background:#3b82f6;
  color:#fff;
}

/* ===== 飛輪區 ===== */
iframe{
  width:100%;
  height:calc(100vh - 100px);
  border:none;
}
</style>
</head>

<body>

<!-- 控制中心 -->
<div class="control-center">
  <div class="title">🧠 投資控制中心</div>

  <div class="btn-group">
    <button class="btn btn-main" onclick="goFlywheel()">🟢 飛輪系統（長線）</button>
    <button class="btn btn-attack" onclick="goBattle()">🚀 戰艦系統（短線）</button>
    <button class="btn btn-data" onclick="reloadFrame()">🔄 重新載入</button>
  </div>
</div>

<!-- 顯示區 -->
<iframe id="mainFrame" src="flywheel.html"></iframe>

<script>
function goFlywheel(){
  document.getElementById("mainFrame").src = "flywheel.html";
}

function goBattle(){
  document.getElementById("mainFrame").src = "battleship.html";
}

function reloadFrame(){
  const frame = document.getElementById("mainFrame");
  frame.src = frame.src;
}
</script>

</body>
</html>
