<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AI戰艦 Pro Max v4.8</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0b0f1a,#111827);
  color:#e5e7eb;
}

.container{padding:20px;}

.panel{
  background:rgba(255,255,255,0.05);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 30px rgba(0,200,255,0.15);
}

.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:10px;
}

.hud{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.hudBox{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.rankS{color:#00ffe1;}
.rankA{color:#6cff6c;}
.rankB{color:#ffaa00;}
.rankD{color:#ff4444;}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  padding:15px;
  margin-top:10px;
}

textarea{
  width:100%;
  background:#111;
  color:white;
  border-radius:10px;
  padding:10px;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c8ff;
  font-weight:bold;
}

</style>
</head>

<body>
<div class="container">

<div class="panel">
<div class="title">📊 戰艦資料輸入</div>
<textarea id="csv" rows="6"></textarea>
<button onclick="analyze()">🚀 啟動戰艦</button>
</div>

<div class="panel">
<div class="title">🧠 戰場總覽</div>
<div class="hud">
<div class="hudBox" id="market"></div>
<div class="hudBox" id="avgRSI"></div>
<div class="hudBox" id="avgVol"></div>
<div class="hudBox" id="summary"></div>
</div>
</div>

<div class="panel">
<div class="title">🏆 主攻名單</div>
<div id="main"></div>
</div>

<div class="panel">
<div class="title">🎯 今日戰術指令</div>
<div id="command"></div>
</div>

</div>

<script>

function parseCSV(t){
let r=t.trim().split("\n");
let d=[];
for(let i=1;i<r.length;i++){
let c=r[i].split(",");
d.push({
code:c[0],
name:c[1],
price:+c[2],
vol:+c[6],
sma20:+c[16],
rsi:+c[18]
});
}
return d;
}

function marketJudge(data){
let avgRSI=data.reduce((a,b)=>a+b.rsi,0)/data.length;
let avgVol=data.reduce((a,b)=>a+b.vol,0)/data.length;

let state="⚡中性市";
if(avgRSI>65 && avgVol>2) state="🔥強勢市";
if(avgRSI<55) state="🛡弱勢市";

return {avgRSI,avgVol,state};
}

function getRank(dev,score,state){

if(state.includes("強勢")){
if(dev<13 && score>20)return "S";
if(dev<16)return "A";
if(dev<18)return "B";
return "D";
}

if(state.includes("弱勢")){
if(dev<10 && score>20)return "S";
if(dev<13)return "A";
if(dev<15)return "B";
return "D";
}

if(dev<12 && score>20)return "S";
if(dev<15)return "A";
if(dev<18)return "B";
return "D";
}

function score(r){
let s=0;
if(r.vol>2)s+=10;
if(r.rsi>60)s+=10;
if(r.rsi>70)s+=5;
return s;
}

function getPosition(rank,state){

if(state.includes("強勢")){
if(rank=="S")return "100%";
if(rank=="A")return "80%";
if(rank=="B")return "40%";
}

if(state.includes("弱勢")){
if(rank=="S")return "70%";
if(rank=="A")return "40%";
if(rank=="B")return "0%";
}

if(rank=="S")return "100%";
if(rank=="A")return "70%";
if(rank=="B")return "30%";

return "0%";
}

function analyze(){

let text=document.getElementById("csv").value;
let data=parseCSV(text);

let m=marketJudge(data);

document.getElementById("market").innerHTML=m.state;
document.getElementById("avgRSI").innerHTML="RSI "+m.avgRSI.toFixed(1);
document.getElementById("avgVol").innerHTML="量能 "+m.avgVol.toFixed(2);

let html="";
let best=null;
let countS=0;

data.forEach(r=>{
let dev=(r.price-r.sma20)/r.sma20*100;
let sc=score(r);
let rank=getRank(dev,sc,m.state);
let pos=getPosition(rank,m.state);

if(rank=="S")countS++;

if(rank=="S" && !best) best=r;

let cls="rank"+rank;

html+=`
<div class="card">
<div class="${cls}">${rank}級 ${r.code} ${r.name}</div>
乖離 ${dev.toFixed(1)}%｜
RSI ${r.rsi}｜
量能 ${r.vol}<br>
建議倉位 ${pos}
</div>
`;
});

document.getElementById("main").innerHTML=html;

document.getElementById("summary").innerHTML="S級數量 "+countS;

if(best){

let msg="";

if(m.state.includes("強勢")){
msg="🔥 主攻模式：允許進攻";
}else if(m.state.includes("弱勢")){
msg="🛡 防守模式：嚴控風險";
}else{
msg="⚡ 標準模式：穩定操作";
}

document.getElementById("command").innerHTML=
`${msg}<br>
👉 主攻 ${best.code} ${best.name}<br>
停損 -7%<br>
停利 10% / 15%`;

}else{
document.getElementById("command").innerHTML=
"🛡 今日無安全標的（全面防守）";
}

}

</script>

</body>
</html>
