<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 戰艦 Pro Max v4.9</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
}
.container{padding:16px;}
.card{
  background:#111827;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 0 10px rgba(0,255,255,0.1);
}
.title{font-size:18px;margin-bottom:8px;color:#00eaff;}

textarea{width:100%;height:120px;background:#000;color:#0f0;border:none;padding:8px;}
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#00eaff;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.stock{
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid #222;
}

.badge{
  padding:2px 6px;
  border-radius:6px;
}

.S{background:#00ffcc;color:#000;}
.A{background:#4caf50;}
.B{background:#ff9800;}
.D{background:#f44336;}

.lock{color:red;font-size:12px;}
</style>
</head>

<body>
<div class="container">

<div class="card">
<div class="title">CSV 輸入</div>
<textarea id="csv"></textarea>
<button onclick="analyze()">開始分析</button>
</div>

<div class="card">
<div class="title">排名結果</div>
<div id="rank"></div>
</div>

<div class="card">
<div class="title">最終決策</div>
<div id="decision"></div>
<button onclick="finalDecision()">一鍵最終決策</button>
</div>

<div class="card">
<div class="title">持倉監控</div>
<div>
股價 <input id="price">
買入 <input id="buy">
股數 <input id="qty">
<button onclick="calc()">計算</button>
</div>
<div id="pnl"></div>
</div>

</div>

<script>

let data=[];

// ===== 解析CSV =====
function analyze(){
  let text=document.getElementById('csv').value;
  let rows=text.split('\n').slice(1);

  data=rows.map(r=>{
    let c=r.split(',');
    let price=parseFloat(c[2]);
    let vol=parseFloat(c[6]);
    let sma20=parseFloat(c[17]);
    let rsi=parseFloat(c[19]);

    let dev=((price-sma20)/sma20)*100;

    return{
      name:c[1],
      code:c[0],
      price,vol,sma20,rsi,dev
    }
  });

  data.forEach(r=>{
    r.grade=getGrade(r);
    r.lock=r.dev>15;
    r.score=score(r);
  });

  render();
}

// ===== 分級 =====
function getGrade(r){
  if(r.dev<5 && r.rsi<70 && r.vol>2) return "S";
  if(r.dev<10) return "A";
  if(r.dev<15) return "B";
  return "D";
}

// ===== 評分 =====
function score(r){
  let s=0;
  if(r.dev<5)s+=30;
  else if(r.dev<10)s+=20;
  else if(r.dev<15)s+=10;
  else s-=30;

  if(r.rsi<70)s+=20;
  if(r.vol>2)s+=20;

  return s;
}

// ===== 顯示 =====
function render(){
  let html="";
  data.sort((a,b)=>b.score-a.score);

  data.forEach(r=>{
    html+=`
    <div class="stock">
      <div>${r.code} ${r.name}</div>
      <div>
        <span class="badge ${r.grade}">${r.grade}</span>
        ${r.lock?'<span class="lock">🚨鎖單</span>':''}
      </div>
    </div>`;
  });

  document.getElementById('rank').innerHTML=html;
}

// ===== 市場判斷 =====
function getMode(){
  let avg=data.reduce((a,b)=>a+b.dev,0)/data.length;
  if(avg>10)return "🔥強勢";
  if(avg>5)return "⚖️標準";
  return "🛡保守";
}

// ===== 最終決策 =====
function finalDecision(){
  let picks=data.filter(r=>!r.lock).slice(0,2);

  let mode=getMode();

  let html=`市場：${mode}<br>`;

  picks.forEach(p=>{
    html+=`${p.code} ${p.name}<br>`;
  });

  document.getElementById('decision').innerHTML=html;
}

// ===== 持倉 =====
function calc(){
  let p=parseFloat(price.value);
  let b=parseFloat(buy.value);
  let q=parseFloat(qty.value);

  let pnl=(p-b)*q;
  let rate=((p-b)/b*100).toFixed(2);

  let status="🟢持有";

  if(rate<-7)status="🔴停損";
  if(rate>10)status="🟡停利區";

  document.getElementById('pnl').innerHTML=
  `損益:${pnl}<br>報酬:${rate}%<br>${status}`;
}

</script>

</body>
</html>
