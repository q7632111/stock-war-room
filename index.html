<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#050a12" />
  <title>AI 戰艦 Pro Max v9.2｜實戰定版</title>
  <style>
    :root{
      --bg:#071019;
      --bg2:#0d1722;
      --panel:#101d2a;
      --panel2:#132233;
      --line:#24405c;
      --line2:#2f567a;
      --text:#e7f1fb;
      --muted:#8ea7bf;
      --cyan:#56d7ff;
      --cyan2:#1cb7ff;
      --green:#34d399;
      --yellow:#fbbf24;
      --red:#f87171;
      --orange:#fb923c;
      --purple:#a78bfa;
      --shadow:0 0 0 1px rgba(86,215,255,.12), 0 8px 24px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.03);
      --glow:0 0 0 1px rgba(86,215,255,.18), 0 0 18px rgba(28,183,255,.14);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;
      background:
        radial-gradient(circle at top left, rgba(28,183,255,.09), transparent 30%),
        radial-gradient(circle at top right, rgba(52,211,153,.06), transparent 25%),
        linear-gradient(180deg, #06111b 0%, #08131f 100%);
      color:var(--text);
      font-family:"Segoe UI","Noto Sans TC",system-ui,sans-serif;
    }
    body{min-height:100vh}
    .wrap{max-width:1680px;margin:0 auto;padding:14px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px 14px;
      background:linear-gradient(180deg, rgba(19,34,51,.96), rgba(10,20,31,.96));
      border:1px solid var(--line2);box-shadow:var(--shadow);border-radius:14px;
      margin-bottom:14px;position:sticky;top:0;z-index:30;backdrop-filter: blur(8px)
    }
    .brand{display:flex;flex-direction:column;gap:2px}
    .brand h1{margin:0;font-size:22px;letter-spacing:1px;color:#dff6ff;text-shadow:0 0 12px rgba(86,215,255,.2)}
    .brand .sub{font-size:12px;color:var(--muted)}
    .statusbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      padding:8px 12px;border-radius:999px;
      background:linear-gradient(180deg, rgba(15,28,42,.95), rgba(8,18,28,.95));
      border:1px solid var(--line);color:#d9edff;font-size:12px;font-weight:700;box-shadow:var(--glow)
    }
    .pill.green{color:#d8fff1;border-color:rgba(52,211,153,.45)}
    .pill.yellow{color:#fff5d6;border-color:rgba(251,191,36,.45)}
    .pill.red{color:#ffe0e0;border-color:rgba(248,113,113,.45)}
    .pill.purple{color:#efe8ff;border-color:rgba(167,139,250,.45)}
    .layout{display:grid;grid-template-columns:1.08fr 1.65fr 1.15fr;gap:14px;align-items:start}
    .col{display:flex;flex-direction:column;gap:14px}
    @media (max-width:1380px){.layout{grid-template-columns:1fr}}
    .panel{background:linear-gradient(180deg, rgba(16,29,42,.98), rgba(9,18,28,.98));border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(90deg, rgba(86,215,255,.10), transparent 40%),linear-gradient(180deg, rgba(18,35,52,.95), rgba(11,22,34,.95));border-bottom:1px solid rgba(86,215,255,.12)}
    .panel-title{margin:0;font-size:15px;font-weight:900;letter-spacing:.5px;color:#dff6ff}
    .panel-sub{font-size:11px;color:var(--muted)}
    .panel-body{padding:14px}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .grid-5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
    @media (max-width:900px){.grid-2,.grid-3,.grid-4,.grid-5{grid-template-columns:1fr}}
    .metric{background:linear-gradient(180deg, rgba(14,25,37,.95), rgba(8,16,25,.95));border:1px solid rgba(86,215,255,.10);border-radius:12px;padding:12px}
    .metric .label{font-size:11px;color:var(--muted);margin-bottom:6px}
    .metric .value{font-size:22px;font-weight:900;letter-spacing:.3px}
    .metric .value.small{font-size:16px}
    .muted{color:var(--muted)} .green{color:var(--green)} .yellow{color:var(--yellow)} .red{color:var(--red)} .orange{color:var(--orange)} .cyan{color:var(--cyan)} .purple{color:var(--purple)}
    label{display:block;font-size:12px;color:#cce5fb;margin-bottom:4px;font-weight:700}
    input,textarea,select{width:100%;background:linear-gradient(180deg, rgba(4,11,18,.95), rgba(8,16,25,.95));color:var(--text);border:1px solid #21405d;border-radius:10px;padding:10px 11px;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.02)}
    textarea{resize:vertical;min-height:130px}
    input:focus,textarea:focus,select:focus{border-color:var(--cyan2);box-shadow:0 0 0 3px rgba(28,183,255,.12)}
    .btnrow{display:flex;flex-wrap:wrap;gap:8px}
    .btn{appearance:none;border:none;cursor:pointer;color:#eaf7ff;font-weight:900;letter-spacing:.3px;padding:10px 14px;border-radius:12px;background:linear-gradient(180deg, #18324a, #0f2335);border:1px solid #315676;box-shadow:var(--glow); transition: 0.2s;}
    .btn:hover{filter:brightness(1.08)}
    .btn.secondary{background:linear-gradient(180deg, #162231, #101c29);border-color:#29465f}
    .btn.green{background:linear-gradient(180deg, #154537, #103226);border-color:#2d7d64}
    .btn.red{background:linear-gradient(180deg, #4a1b1b, #331212);border-color:#8b3e3e}
    .btn.purple{background:linear-gradient(180deg, #39245b, #221337);border-color:#6f4fa8}
    .btn.small{padding:7px 10px;border-radius:10px;font-size:12px}
    .card{background:linear-gradient(180deg, rgba(15,26,38,.98), rgba(8,15,23,.98));border:1px solid rgba(86,215,255,.12);border-radius:14px;padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.02)}
    .card + .card{margin-top:10px}
    .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
    .symbol{font-size:20px;font-weight:900;letter-spacing:.5px;color:#eef8ff}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:900;border:1px solid transparent;background:rgba(255,255,255,.04)}
    .badge.green{border-color:rgba(52,211,153,.4);color:#dcfff3}
    .badge.yellow{border-color:rgba(251,191,36,.4);color:#fff4d2}
    .badge.red{border-color:rgba(248,113,113,.4);color:#ffe2e2}
    .badge.cyan{border-color:rgba(86,215,255,.4);color:#def8ff}
    .badge.purple{border-color:rgba(167,139,250,.4);color:#efe8ff}
    .mini{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:8px}
    .mini .cell{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:8px}
    .cell .k{font-size:10px;color:var(--muted)}
    .cell .v{font-size:14px;font-weight:800;margin-top:4px}
    
    .tableWrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:1360px;font-size:13px}
    th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;vertical-align:top}
    th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    tr:last-child td{border-bottom:none}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .right{text-align:right}
    .center{text-align:center}
    .warning-box{border:1px solid rgba(248,113,113,.35);background:linear-gradient(180deg, rgba(80,25,25,.22), rgba(43,14,14,.16));color:#ffd8d8;border-radius:12px;padding:10px 12px;font-size:13px}
    .ok-box{border:1px solid rgba(52,211,153,.3);background:linear-gradient(180deg, rgba(18,74,54,.18), rgba(12,43,31,.15));color:#d9fff1;border-radius:12px;padding:10px 12px;font-size:13px}
    .footnote{font-size:11px;color:var(--muted);line-height:1.5}
    .divider{height:1px;background:linear-gradient(90deg, transparent, rgba(86,215,255,.14), transparent);margin:12px 0}
    
    .scoreA{color:var(--green);font-weight:900}
    .scoreB{color:var(--yellow);font-weight:900}
    .scoreC{color:var(--red);font-weight:900}
    .rankTop{font-size:18px;font-weight:900;color:#fff}
    .rank1{color:#7dd3fc}.rank2{color:#c4b5fd}.rank3{color:#fbbf24}
    .mainAttackGlow{box-shadow:0 0 0 1px rgba(167,139,250,.3), 0 0 22px rgba(167,139,250,.18), inset 0 1px 0 rgba(255,255,255,.03)}
    
    .risk-pill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:900;border:1px solid var(--line)}
    .risk-low{background:rgba(52,211,153,0.14);color:#bbf7d0;border-color:rgba(52,211,153,0.3)}
    .risk-mid{background:rgba(251,191,36,0.14);color:#fde68a;border-color:rgba(251,191,36,0.3)}
    .risk-high{background:rgba(248,113,113,0.14);color:#fecaca;border-color:rgba(248,113,113,0.3)}
    .action-box{padding:8px 10px;border-radius:10px;font-weight:900;text-align:center}
    .action-danger{background:rgba(248,113,113,0.18);color:var(--red);border:1px solid rgba(248,113,113,0.35);animation:blink 2s infinite}
    .action-warn{background:rgba(251,191,36,0.18);color:var(--yellow);border:1px solid rgba(251,191,36,0.35)}
    .action-ok{background:rgba(52,211,153,0.18);color:var(--green);border:1px solid rgba(52,211,153,0.35)}
    .action-info{background:rgba(96,165,250,0.18);color:var(--cyan);border:1px solid rgba(96,165,250,0.35)}
    .order-btn { padding: 6px 12px; font-size: 12px; border-radius: 8px; border: 1px solid var(--line); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: 0.2s;}
    .order-btn.ordered { background: rgba(52,211,153,0.2); border-color: var(--green); color: var(--green); }
    
    .close-overlay{position:fixed;inset:0;background:rgba(3,7,18,0.85);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
    .close-overlay.show{display:flex}
    .close-modal{width:min(560px,100%);background:var(--panel);border:1px solid var(--line2);border-radius:22px;padding:20px;box-shadow:var(--shadow)}
    @keyframes blink{0%{opacity:1}50%{opacity:.6}100%{opacity:1}}

    @media (max-width:920px){
      .tableWrap table{min-width:100%;display:block;border:none}
      .tableWrap thead{display:none}
      .tableWrap tbody,.tableWrap tr,.tableWrap td{display:block;width:100%;border:none}
      .tableWrap tr{margin-bottom:16px;border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.02);box-shadow:var(--shadow)}
      .tableWrap td{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(255,255,255,.04);padding:10px 0;text-align:right}
      .tableWrap td:last-child{border-bottom:0}
      .tableWrap td::before{content:attr(data-label);font-size:12px;color:var(--muted);text-align:left;margin-right:10px;font-weight:800}
      .tableWrap td > div { text-align: right; width: 100%; display: flex; flex-direction: column; align-items: flex-end; }
      .action-box { display: inline-block; width: auto; }
      .rowActions { display: flex; gap: 8px; justify-content: flex-end; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>AI 戰艦 Pro Max v9.2</h1>
        <div class="sub">實戰定版｜單一真相收斂・全自動量化風控主機</div>
      </div>
      <div class="statusbar" id="topStatusBar"></div>
    </div>

    <div class="layout">
      <!-- 左欄 -->
      <div class="col">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">主控總覽列</h2>
              <div class="panel-sub">晚上打開先看這區，明天能不能打、主攻是誰、風險剩多少</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="grid-4" id="heroMetrics"></div>
            <div class="divider"></div>
            <div class="grid-2">
              <div class="metric"><div class="label">今日唯一指令</div><div class="value small" id="todayInstruction"></div></div>
              <div class="metric"><div class="label">最後同步時間</div><div class="value small mono" id="lastSyncTime"></div></div>
            </div>
            <div class="divider"></div>
            <div id="mainAttackSummary"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">市場戰況艙</h2>
              <div class="panel-sub">決定明天是否開倉、最多打幾檔、風險放多少</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="grid-2">
              <div><label>上漲家數</label><input id="advancersInput" type="number" /></div>
              <div><label>下跌家數</label><input id="declinersInput" type="number" /></div>
              <div><label>漲停家數</label><input id="limitUpInput" type="number" /></div>
              <div><label>跌停家數</label><input id="limitDownInput" type="number" /></div>
              <div><label>OTC 漲跌幅 (%)</label><input id="otcChangeInput" type="number" step="0.01" /></div>
              <div><label>加權 漲跌幅 (%)</label><input id="taiexChangeInput" type="number" step="0.01" /></div>
            </div>
            <div class="btnrow" style="margin-top:10px">
              <button class="btn" id="calcMarketBtn">計算市場燈號</button>
              <button class="btn secondary" id="saveMarketBtn">儲存市場狀態</button>
            </div>
            <div class="divider"></div>
            <div class="grid-3" id="marketSummary"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">火控設定艙</h2>
              <div class="panel-sub">固定風險部位模型 + 連敗降載 + V轉試單</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="grid-2">
              <div><label>總資金</label><input id="capitalInput" type="number" step="1" /></div>
              <div><label>可用現金</label><input id="availableCashInput" type="number" step="1" /></div>
              <div><label>單日最大風險 (%)</label><input id="dailyRiskPercentInput" type="number" step="0.1" /></div>
              <div><label>單檔最大資金 (%)</label><input id="singlePositionCapitalPercentInput" type="number" step="0.1" /></div>
              <div><label>最多新倉檔數</label><input id="maxNewPositionsInput" type="number" step="1" min="1" /></div>
              <div><label>連敗次數</label><input id="lossStreakInput" type="number" step="1" min="0" /></div>
            </div>
            <div class="btnrow" style="margin-top:10px">
              <button class="btn" id="saveRiskBtn">儲存火控設定</button>
              <button class="btn secondary" id="resetAllBtn">重置全部資料</button>
            </div>
            <div class="divider"></div>
            <div id="riskModeSummary"></div>
          </div>
        </section>
      </div>

      <!-- 中欄 -->
      <div class="col">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">戰隊決策艙</h2>
              <div class="panel-sub">TradingView CSV 直讀 → v9.1 權重校準 → 主攻排序 → 戰隊鎖定</div>
            </div>
          </div>
          <div class="panel-body">
            <label>貼上 TradingView CSV（保留標題列）</label>
            <textarea id="candidateTextarea" placeholder="直接貼上 TradingView CSV，例如：&#10;商品,描述,價格,價格 - 貨幣,價格變化 % 1天,..."></textarea>
            <div class="btnrow">
              <button class="btn" id="parseCandidatesBtn">解析 CSV + v9.1 校準評分</button>
              <button class="btn secondary" id="clearCandidatesBtn">清空候選</button>
            </div>
            <div class="divider"></div>
            <div id="candidateWarnings"></div>
            <div class="divider"></div>
            <div class="tableWrap" id="candidateRankingTable"></div>
            <div class="divider"></div>
            <div id="candidateCards"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">智慧單輸出艙</h2>
              <div class="panel-sub">明天照這裡掛單，不要盤中再改</div>
            </div>
          </div>
          <div class="panel-body">
            <div id="orderSummaryBox"></div>
            <div class="divider"></div>
            <div class="tableWrap" id="ordersTable"></div>
          </div>
        </section>
      </div>

      <!-- 右欄 -->
      <div class="col">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">持倉指揮艙</h2>
              <div class="panel-sub">更新高點 / 收盤價 / 狀態，決定明天續抱、防守或撤退</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="grid-4" style="margin-bottom: 14px;">
              <div><label class="small">代號</label><input id="holdSymbol" placeholder="例如 5244"></div>
              <div><label class="small">買入價</label><input id="holdBuy" type="number" step="0.01"></div>
              <div><label class="small">股數</label><input id="holdShares" type="number" step="1" value="1000" placeholder="1000"></div>
              <div><label class="small">收盤現價</label><input id="holdCurrent" type="number" step="0.01"></div>
            </div>
            <div class="btnrow" style="margin-bottom: 16px;">
              <button class="btn" id="addHoldBtn">手動加入監控</button>
              <button class="btn secondary" id="loadTopBtn">快速帶入首選</button>
            </div>
            <div class="divider"></div>
            <div id="positionsBox"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">飛輪戰報艙</h2>
              <div class="panel-sub">看系統是不是在累積，而不是只看單筆勝負</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="grid-5" id="performanceMetrics"></div>
            <div class="divider"></div>
            <div class="tableWrap" id="logsTable"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="closeOverlay" class="close-overlay">
    <div class="close-modal">
      <div class="panel-title" style="margin-bottom: 10px;">📤 執行平倉</div>
      <p id="closeInfo" class="small"></p>
      <div style="margin-bottom:15px">
        <label class="small">實際賣出成交價</label>
        <input id="closePrice" type="number" step="0.01">
      </div>
      <div>
        <label class="small">出場原因</label>
        <select id="closeReason">
          <option value="TP">💰 達標獲利 (TP)</option>
          <option value="SL">🛡️ 觸價停損 (SL)</option>
          <option value="Trim">✂️ 減碼抽回資金</option>
          <option value="Manual">✋ 系統外手動調節</option>
        </select>
      </div>
      <div class="toolbar" style="margin-top:20px">
        <button id="confirmCloseBtn" class="btn success" style="flex:1">確認平倉並寫入飛輪</button>
        <button id="cancelCloseBtn" class="btn secondary" style="flex:1">取消</button>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const STORAGE_KEY = 'warroom_v9_2_ssot_final';

    const defaultState = {
      market: {
        advancers: 0, decliners: 0, limitUp: 0, limitDown: 0,
        otcChange: 0, taiexChange: 0,
        breadthScore: 0, sentimentScore: 0, totalScore: 0,
        signal: 'yellow', maxNewPositionsAllowed: 1,
        instruction: '等待市場狀態更新'
      },
      risk: {
        capital: 200000,
        availableCash: 200000,
        dailyRiskPercent: 1,
        singlePositionCapitalPercent: 25,
        maxNewPositions: 2,
        lossStreak: 0
      },
      candidatesRawText: '',
      candidates: [],
      positions: [],
      logs: [],
      lastSync: '',
      pendingCloseId: null,
      maxDev: 10
    };

    let state = loadState();

    function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return clone(defaultState);
        return deepMerge(clone(defaultState), JSON.parse(raw));
      }catch(e){ return clone(defaultState); }
    }
    function deepMerge(target, source){
      for(const key in source){
        if(source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])){
          if(!target[key]) target[key] = {};
          deepMerge(target[key], source[key]);
        }else target[key] = source[key];
      }
      return target;
    }
    function saveState(){
      state.lastSync = nowString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
    }
    function nowString(){ const d = new Date(); const p = n => String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
    function num(v, fallback = 0){ const n = Number(v); return Number.isFinite(n) ? n : fallback; }
    function fmt(n, digits = 0){ if(n===null||n===undefined||n==='') return '-'; return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:digits,maximumFractionDigits:digits}); }
    function pct(n,d=2){ return `${fmt(n,d)}%`; }
    function signalClass(signal){ return signal==='green' ? 'green' : signal==='red' ? 'red' : 'yellow'; }
    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
    function safeNum(v, fallback = 0){ const n = Number(v); return Number.isFinite(n) ? n : fallback; }

    function getLossMode(lossStreak){
      if(lossStreak >= 4) return { mode:'冷卻模式', riskMultiplier:0, maxNewPositionsOverride:0, note:'連敗達 4，禁止開新倉，只管理舊倉。' };
      if(lossStreak >= 3) return { mode:'防守模式', riskMultiplier:0.5, maxNewPositionsOverride:1, note:'連敗達 3，只能打一檔，單日風險減半。' };
      if(lossStreak >= 2) return { mode:'保守模式', riskMultiplier:0.5, maxNewPositionsOverride:null, note:'連敗達 2，單日風險減半。' };
      return { mode:'正常模式', riskMultiplier:1, maxNewPositionsOverride:null, note:'依市場燈號正常運作。' };
    }
    function getMarketDecision(totalScore){
      if(totalScore >= 70) return { signal:'green', maxNewPositionsAllowed:2, instruction:'綠燈正常作戰，可開新倉，最多兩檔。' };
      if(totalScore <= 39) return { signal:'red', maxNewPositionsAllowed:0, instruction:'紅燈禁止開倉，只管理舊倉。' };
      return { signal:'yellow', maxNewPositionsAllowed:1, instruction:'黃燈降風險，只打一檔或降低火力。' };
    }
    function calculateAutoSentimentScore(m){
      const otc = num(m.otcChange);
      const taiex = num(m.taiexChange);
      const up = num(m.limitUp);
      const down = num(m.limitDown);
      let score = 50;

      if(taiex > 1.2) score += 15;
      else if(taiex > 0.5) score += 8;
      else if(taiex < -1.2) score -= 15;
      else if(taiex < -0.5) score -= 8;

      if(otc > 1.0) score += 15;
      else if(otc > 0.4) score += 8;
      else if(otc < -1.0) score -= 15;
      else if(otc < -0.4) score -= 8;

      const spread = up - down;
      if(spread > 30) score += 12;
      else if(spread > 10) score += 6;
      else if(spread < -30) score -= 12;
      else if(spread < -10) score -= 6;

      return Math.max(0, Math.min(100, Math.round(score * 10) / 10));
    }
    function calculateMarket(){
      const m = state.market;
      const adv = num(m.advancers), dec = num(m.decliners), up = num(m.limitUp), down = num(m.limitDown), otc = num(m.otcChange), taiex = num(m.taiexChange);
      const totalBreadth = adv + dec;
      const advRatio = totalBreadth > 0 ? adv / totalBreadth : 0.5;
      let breadthScore = advRatio * 60;
      breadthScore += Math.max(-10, Math.min(10, (adv-dec)/50));
      breadthScore += Math.max(-8, Math.min(8, up-down));
      breadthScore = Math.max(0, Math.min(100, Math.round(breadthScore * 10) / 10));
      const sentimentScore = calculateAutoSentimentScore(m);
      const totalScore = Math.round((breadthScore*0.6 + sentimentScore*0.4) * 10) / 10;
      const decision = getMarketDecision(totalScore);
      state.market = { ...state.market, breadthScore, sentimentScore, totalScore, signal:decision.signal, maxNewPositionsAllowed:decision.maxNewPositionsAllowed, instruction:decision.instruction };
    }
    function getUsedCapitalFromOpenPositions(){ return state.positions.filter(p=>p.isOpen).reduce((sum,p)=>sum+num(p.invested),0); }
    function getPortfolioStats(){
      let totalCost = 0, totalPnL = 0;
      state.positions.filter(p=>p.isOpen).forEach(h => {
        const s = Number(h.shares) || 1000;
        totalCost += Number(h.entryPrice || 0) * s;
        totalPnL += (Number(h.currentPrice || 0) - Number(h.entryPrice || 0)) * s;
      });
      const drop = totalCost > 0 ? (totalPnL / totalCost) * 100 : 0;
      return { totalCost, totalPnL, drop };
    }
    function getEffectiveSettings(){
      calculateMarket();
      const lossMode = { ...getLossMode(state.risk.lossStreak) };
      let effectiveDailyRiskPercent = state.risk.dailyRiskPercent * lossMode.riskMultiplier;
      let effectiveMaxNewPositions = Math.min(state.risk.maxNewPositions, state.market.maxNewPositionsAllowed);
      if(lossMode.maxNewPositionsOverride !== null){ effectiveMaxNewPositions = Math.min(effectiveMaxNewPositions, lossMode.maxNewPositionsOverride); }
      if(state.market.signal === 'green' && state.risk.lossStreak >= 3 && num(state.market.totalScore) >= 80){
        effectiveMaxNewPositions = Math.max(1, effectiveMaxNewPositions);
        effectiveDailyRiskPercent = state.risk.dailyRiskPercent * 0.5;
        lossMode.mode = 'V轉試單模式';
        lossMode.note = '大盤強勢綠燈(>80分)，允許半倉試單 1 檔。';
      }else if(state.market.signal === 'red'){
        effectiveMaxNewPositions = 0;
      }
      return { lossMode, effectiveDailyRiskPercent, effectiveMaxNewPositions };
    }
    function buildShareResult(shares, entry, stop, singleRiskAmount, sharesByRisk, sharesByCapital, availableCash){
      const invested = shares * entry;
      const riskPerShare = Math.abs(entry-stop);
      const positionRisk = shares * riskPerShare;
      return { shares, boardLots:Math.floor(shares/1000), oddLots:shares%1000, invested, positionRisk, singleRiskAmount, sharesByRisk, sharesByCapital, availableCash };
    }
    function calcShares(entry, stop){
      const { effectiveDailyRiskPercent, effectiveMaxNewPositions } = getEffectiveSettings();
      const capital = num(state.risk.capital);
      const configuredAvailableCash = num(state.risk.availableCash);
      const usedCapital = getUsedCapitalFromOpenPositions();
      const realAvailableCash = Math.max(0, configuredAvailableCash - usedCapital);
      const singlePositionCapitalPercent = num(state.risk.singlePositionCapitalPercent);
      const totalRiskAmount = capital * (effectiveDailyRiskPercent / 100);
      const bucketCount = effectiveMaxNewPositions > 0 ? effectiveMaxNewPositions : 1;
      const singleRiskAmount = totalRiskAmount / bucketCount;
      const riskPerShare = Math.abs(entry - stop);
      if(riskPerShare <= 0) return buildShareResult(0, entry, stop, singleRiskAmount, 0, 0, realAvailableCash);
      const sharesByRisk = Math.floor(singleRiskAmount / riskPerShare);
      const maxCapitalForPosition = Math.min(realAvailableCash, capital * (singlePositionCapitalPercent / 100));
      const sharesByCapital = Math.floor(maxCapitalForPosition / entry);
      const finalShares = Math.max(0, Math.min(sharesByRisk, sharesByCapital));
      return buildShareResult(finalShares, entry, stop, singleRiskAmount, sharesByRisk, sharesByCapital, realAvailableCash);
    }
    function calcRR(entry, stop, takeProfit){ const risk = entry-stop; const reward = takeProfit-entry; return risk <= 0 ? 0 : reward/risk; }

    function splitCsvLine(line){
      const result = [];
      let current = '';
      let inQuotes = false;
      for(let i=0;i<line.length;i++){
        const ch = line[i];
        if(ch === '"'){
          if(inQuotes && line[i+1] === '"'){ current += '"'; i++; }
          else inQuotes = !inQuotes;
        }else if(ch === ',' && !inQuotes){
          result.push(current); current = '';
        }else current += ch;
      }
      result.push(current);
      return result.map(x => x.trim());
    }
    function normalizeHeader(h){ return String(h).replace(/^"|"$/g,'').trim(); }
    function getCsvIndexMap(headers){
      const map = {};
      headers.forEach((h, idx) => { map[normalizeHeader(h)] = idx; });
      return map;
    }
    function valAt(row, map, key){
      const idx = map[key];
      if(idx === undefined) return '';
      return row[idx] ?? '';
    }

    function analystScore(rating){
      const t = String(rating || '').trim();
      if(t.includes('強力買入')) return 5;
      if(t.includes('買入')) return 4;
      if(t.includes('中立')) return 2;
      return 2;
    }

    function marketSignalNumeric(signal){
      if(signal === 'green') return 8;
      if(signal === 'yellow') return 5;
      return 1;
    }

    // 🌟 已對接完整的 v9.1 權重校準版，包含 baseScore 與 rrQualityScore 等變數
    function scoreCandidateCsv(stock, market){
      const close = safeNum(stock.close);
      const sma20 = safeNum(stock.sma20, NaN);
      const sma60 = safeNum(stock.sma60, NaN);
      const changePct = safeNum(stock.changePct, 0);
      const volumeRatio = safeNum(stock.volumeRatio, NaN);
      const rsi14 = safeNum(stock.rsi14, NaN);
      const epsGrowthYoy = safeNum(stock.epsGrowthYoy, NaN);
      const analystRating = stock.analystRating || '';
      const rr = safeNum(stock.rr);
      const riskPct = safeNum(stock.riskPct);

      let maStructureScore = 0;
      if (close > sma20 && sma20 > sma60) maStructureScore = 22;
      else if (close > sma20 && close > sma60) maStructureScore = 17;
      else if (close > sma20) maStructureScore = 11;
      else maStructureScore = 3;

      let momentumScore = 0;
      if (changePct >= 2 && changePct <= 5.5) momentumScore = 12;
      else if (changePct > 5.5 && changePct <= 7.5) momentumScore = 8;
      else if (changePct >= 0 && changePct < 2) momentumScore = 6;
      else if (changePct > 7.5) momentumScore = 4;
      else momentumScore = 1;

      let rsiScore = 4;
      if (!Number.isNaN(rsi14)) {
        if (rsi14 >= 60 && rsi14 <= 74) rsiScore = 10;
        else if (rsi14 > 74 && rsi14 <= 78) rsiScore = 8;
        else if (rsi14 >= 55 && rsi14 < 60) rsiScore = 7;
        else if (rsi14 > 78 && rsi14 <= 82) rsiScore = 5;
        else if (rsi14 > 82) rsiScore = 3;
        else rsiScore = 4;
      }

      let volumeScore = 9;
      if (!Number.isNaN(volumeRatio)) {
        if (volumeRatio >= 1.2 && volumeRatio <= 2.3) volumeScore = 18;
        else if (volumeRatio > 2.3 && volumeRatio <= 3.2) volumeScore = 14;
        else if (volumeRatio >= 1.0 && volumeRatio < 1.2) volumeScore = 10;
        else if (volumeRatio > 3.2 && volumeRatio <= 4.2) volumeScore = 9;
        else if (volumeRatio > 4.2) volumeScore = 7;
        else volumeScore = 6;
      }

      const deviation20 = sma20 > 0 ? ((close - sma20) / sma20) * 100 : 0;
      let heatControlScore = 0;
      if (deviation20 >= 0 && deviation20 <= 10) heatControlScore = 16;
      else if (deviation20 > 10 && deviation20 <= 18) heatControlScore = 13;
      else if (deviation20 > 18 && deviation20 <= 25) heatControlScore = 9;
      else if (deviation20 > 25 && deviation20 <= 35) heatControlScore = 5;
      else if (deviation20 > 35) heatControlScore = 2;
      else heatControlScore = 4;

      const spread = num(market.limitUp) - num(market.limitDown);
      let breadthPart = 1;
      if (num(market.totalScore) >= 80) breadthPart = 5;
      else if (num(market.totalScore) >= 70) breadthPart = 4;
      else if (num(market.totalScore) >= 55) breadthPart = 3;
      else breadthPart = 1;
      let spreadPart = 0;
      if (spread >= 20) spreadPart = 3;
      else if (spread >= 10) spreadPart = 2;
      else if (spread >= 0) spreadPart = 1;
      else spreadPart = 0;
      let marketResonanceScore = marketSignalNumeric(market.signal) + breadthPart + spreadPart;
      marketResonanceScore = clamp(marketResonanceScore, 0, 18);

      let rrQualityScore = 0;
      if (rr >= 2.0 && riskPct >= 2 && riskPct <= 4) rrQualityScore = 12;
      else if (rr >= 1.8 && riskPct >= 2 && riskPct <= 4.5) rrQualityScore = 10;
      else if (rr >= 1.5 && riskPct >= 1.5 && riskPct <= 5) rrQualityScore = 8;
      else if (rr >= 1.3) rrQualityScore = 5;
      else rrQualityScore = 1;

      // V9.1 的分析師評級較為保守
      const analystPart = analystScore(analystRating) * 0.5;

      let epsPart = 1;
      if (!Number.isNaN(epsGrowthYoy)) {
        if (epsGrowthYoy > 30) epsPart = 2;
        else if (epsGrowthYoy >= 10) epsPart = 1.5;
        else if (epsGrowthYoy >= 0) epsPart = 1;
        else epsPart = 0;
      }

      // 總基礎分
      const baseScore = maStructureScore + momentumScore + rsiScore + volumeScore + heatControlScore + marketResonanceScore + rrQualityScore + analystPart + epsPart;

      let penaltyScore = 0;
      if (changePct > 9.5) penaltyScore += 7;
      else if (changePct > 8) penaltyScore += 4;
      if (!Number.isNaN(rsi14)) {
        if (rsi14 > 80) penaltyScore += 7;
        else if (rsi14 > 77) penaltyScore += 4;
      }
      if (deviation20 > 40) penaltyScore += 12;
      else if (deviation20 > 30) penaltyScore += 8;
      else if (deviation20 > 20) penaltyScore += 4;
      if (!Number.isNaN(volumeRatio)) {
        if (volumeRatio > 4.5 && changePct > 8) penaltyScore += 6;
        else if (volumeRatio > 3.5) penaltyScore += 3;
      }

      let rawFinalScore = baseScore - penaltyScore;
      rawFinalScore = clamp(rawFinalScore, 0, 112);
      let localScore = (rawFinalScore / 112) * 100;
      localScore = Math.round(localScore * 10) / 10;

      const warnings = [];
      if (changePct > 7) warnings.push('短線漲幅偏大');
      if (!Number.isNaN(rsi14) && rsi14 > 77) warnings.push('RSI偏熱');
      if (!Number.isNaN(volumeRatio) && volumeRatio > 3.5) warnings.push('相對量偏熱');
      if (deviation20 > 20) warnings.push('價格偏離SMA20過大');
      if (rr < 1.5) warnings.push('風報比偏低');
      if (riskPct > 4.5) warnings.push('停損距離偏大');
      if (market.signal === 'yellow') warnings.push('大盤僅黃燈');

      const rejectReasons = [];
      if (close <= sma20) rejectReasons.push('價格跌回SMA20下方');
      if (rr < 1.2) rejectReasons.push('RR過低');
      if (riskPct > 6) rejectReasons.push('風險距離過大');
      if (safeNum(stock.shares) <= 0) rejectReasons.push('可買股數為0');
      if (market.signal === 'red') rejectReasons.push('大盤紅燈');
      if (changePct > 9.5 && !Number.isNaN(rsi14) && rsi14 > 77) rejectReasons.push('過熱追價風險');
      if (!Number.isNaN(volumeRatio) && volumeRatio > 4.5 && changePct > 8) rejectReasons.push('爆量過熱');

      const rejected = rejectReasons.length > 0;
      let grade = 'C';
      if (!rejected) {
        if (localScore >= 80) grade = 'A';
        else if (localScore >= 70) grade = 'B';
        else grade = 'C';
      }

      // 🌟 主攻資格判定
      const isMainAttackCandidate = !rejected && grade === 'A' && market.signal !== 'red' && rr >= 1.5 && deviation20 <= 30 && (!Number.isNaN(rsi14) ? rsi14 <= 78 : true);

      return {
        ...stock,
        maStructureScore: Math.round(maStructureScore * 10) / 10,
        momentumScore: Math.round(momentumScore * 10) / 10,
        rsiScore: Math.round(rsiScore * 10) / 10,
        volumeScore: Math.round(volumeScore * 10) / 10,
        heatControlScore: Math.round(heatControlScore * 10) / 10,
        marketResonanceScore: Math.round(marketResonanceScore * 10) / 10,
        rrQualityScore: Math.round(rrQualityScore * 10) / 10,
        analystScore: Math.round(analystPart * 10) / 10,
        epsScore: Math.round(epsPart * 10) / 10,
        baseScore: Math.round(baseScore * 10) / 10,
        penaltyScore: Math.round(penaltyScore * 10) / 10,
        localScore,
        deviation20: Math.round(deviation20 * 10) / 10,
        riskPct: Math.round(riskPct * 10) / 10,
        rr: Math.round(rr * 100) / 100,
        grade,
        warnings,
        rejected,
        rejectReasons,
        isMainAttackCandidate
      };
    }

    function rankCandidates(candidates, market){
      const scored = candidates.map(stock => scoreCandidateCsv(stock, market));
      scored.sort((a,b) => {
        if(a.rejected !== b.rejected) return a.rejected ? 1 : -1;
        // 🌟 排序優化：強制主攻股排在最前面
        if (a.isMainAttackCandidate !== b.isMainAttackCandidate) return a.isMainAttackCandidate ? -1 : 1;
        return b.localScore - a.localScore;
      });
      return scored.map((item, idx) => ({ ...item, rank: idx+1 }));
    }

    function parseTradingViewCsv(){
      const text = state.candidatesRawText || '';
      const lines = text.split(/\n+/).map(x => x.trim()).filter(Boolean);
      if(lines.length < 2){
        state.candidates = []; saveState(); return;
      }

      if(lines[0].includes(',') && (lines[0].includes('商品') || lines[0].includes('ticker') || lines[0].includes('symbol'))) {
          const headers = splitCsvLine(lines[0]).map(normalizeHeader);
          const map = getCsvIndexMap(headers);
          const parsed = [];

          for(let i=1;i<lines.length;i++){
            const row = splitCsvLine(lines[i]);
            if(!row.length || row.length < 2) continue;

            const symbol = valAt(row, map, '商品') || valAt(row, map, 'ticker') || row[0];
            const name = valAt(row, map, '描述') || valAt(row, map, 'description') || '';
            const close = num(valAt(row, map, '價格') || valAt(row, map, 'close') || row[2], NaN);
            
            if(!symbol || Number.isNaN(close)) continue;

            const changePct = num(valAt(row, map, '價格變化 % 1天') || valAt(row, map, 'change'), 0);
            const volumeRatio = num(valAt(row, map, '相對成交量 1天') || valAt(row, map, 'relvol'), NaN);
            const analystRating = valAt(row, map, '分析師評級');
            const sma20 = num(valAt(row, map, '簡單移動平均線 (20) 1天'), NaN);
            const sma60 = num(valAt(row, map, '簡單移動平均線 (60) 1天'), NaN);
            const rsi14 = num(valAt(row, map, '相對強弱指標 (14) 1天'), NaN);
            const epsGrowthYoy = num(valAt(row, map, '稀釋每股盈餘成長率 %, TTM年增率'), NaN);

            const entry = close;
            const stop = Number((close * 0.97).toFixed(2));
            const takeProfit = Number((close * 1.05).toFixed(2));
            const fire = calcShares(entry, stop);
            const rr = calcRR(entry, stop, takeProfit);
            const riskPct = entry > stop ? ((entry - stop)/entry)*100 : 999;

            parsed.push({
              id:`${symbol}_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
              symbol, name, close, high: close, changePct, volumeRatio, analystRating, sma20, sma60, rsi14, epsGrowthYoy,
              entry, stop, takeProfit, rr, riskPct,
              shares: fire.shares, boardLots: fire.boardLots, oddLots: fire.oddLots,
              invested: fire.invested, positionRisk: fire.positionRisk,
              sharesByRisk: fire.sharesByRisk, sharesByCapital: fire.sharesByCapital, singleRiskAmount: fire.singleRiskAmount,
              selected: false, createdAt: nowString()
            });
          }
          const marketData = { signal: state.market.signal, totalScore: state.market.totalScore, limitUp: state.market.limitUp, limitDown: state.market.limitDown };
          state.candidates = rankCandidates(parsed, marketData);
      } else {
         const parsed = [];
         for(const row of lines){
             const tokens = row.split(/[,\s]+/).filter(Boolean);
             if(tokens.length < 2) continue;
             const symbol = tokens[0];
             const nums = [];
             for(let i=1; i<tokens.length; i++){
               const n = parseFloat(tokens[i]);
               if(!isNaN(n)) nums.push(n);
             }
             if(nums.length < 1) continue;
             const close = nums[0];
             const high = nums.length > 1 ? nums[1] : close;
             const entry = close;
             const stop = Number((close * 0.97).toFixed(2));
             const takeProfit = Number((close * 1.05).toFixed(2));
             const fire = calcShares(entry, stop);
             
             parsed.push({
                 id: `${symbol}_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
                 symbol, close, high, entry, stop, takeProfit, rr: calcRR(entry, stop, takeProfit),
                 shares: fire.shares, boardLots: fire.boardLots, oddLots: fire.oddLots,
                 invested: fire.invested, positionRisk: fire.positionRisk, sharesByRisk: fire.sharesByRisk,
                 sharesByCapital: fire.sharesByCapital, singleRiskAmount: fire.singleRiskAmount,
                 selected: false, createdAt: nowString(), dev: 0,
                 grade: 'C', localScore: 0, warnings: ['簡單輸入模式無進階評分'], rejected: false,
                 baseScore: 0, penaltyScore: 0, rrQualityScore: 0, isMainAttackCandidate: false
             });
         }
         state.candidates = parsed;
      }
      saveState();
    }

    function validateCandidate(c){
      const errors = [];
      if(state.market.signal === 'red') errors.push('紅燈日禁止開新倉');
      if(c.stop >= c.entry) errors.push('停損不得高於或等於買價');
      if(c.takeProfit <= c.entry) errors.push('停利不得低於或等於買價');
      if(c.shares <= 0) errors.push('可買股數為 0');
      const { effectiveMaxNewPositions } = getEffectiveSettings();
      const selectedCount = state.candidates.filter(x => x.selected).length;
      if(!c.selected && selectedCount >= effectiveMaxNewPositions) errors.push('已達可開新倉上限');
      if(c.rejected) errors.push(...(c.rejectReasons || []));
      return errors;
    }
    function toggleSelectCandidate(id){
      const candidate = state.candidates.find(c => c.id === id);
      if(!candidate) return;
      if(candidate.selected){ candidate.selected = false; saveState(); return; }
      const { effectiveMaxNewPositions } = getEffectiveSettings();
      const selectedCount = state.candidates.filter(c => c.selected).length;
      if(selectedCount >= effectiveMaxNewPositions) return alert('已達今晚可鎖定的新倉上限。');
      const errors = validateCandidate(candidate);
      if(errors.length) return alert('此標的目前不可鎖定：\n- ' + errors.join('\n- '));
      candidate.selected = true;
      saveState();
    }
    function addPositionFromCandidate(id){
      const c = state.candidates.find(x => x.id === id);
      if(!c) return;
      if(state.positions.some(p => p.symbol === c.symbol && p.isOpen)) return alert('此股票已在持倉中。');
      const errors = validateCandidate(c);
      if(errors.length) return alert('此標的目前不可建倉：\n- ' + errors.join('\n- '));
      state.positions.push({
        id:`pos_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
        symbol:c.symbol, name:c.name || '', entryPrice:c.entry, shares:c.shares, boardLots:c.boardLots, oddLots:c.oddLots,
        entryDate:nowString(), currentPrice:c.close, highestPrice:Math.max(c.high, c.close), lastClose:c.close,
        initialStop:c.stop, trailingStop:c.stop, takeProfitRef:c.takeProfit, rr:c.rr, invested:c.invested,
        status:'持有觀察', note:'', isOpen:true
      });
      saveState();
    }

    function addManualHolding(){
      const symbol = $('holdSymbol').value.trim();
      const entryPrice = num($('holdBuy').value, NaN);
      const shares = Math.max(1, Math.floor(num($('holdShares').value, 1000)));
      const currentPrice = num($('holdCurrent').value, NaN);

      if(!symbol) return alert('請輸入代號');
      if(!Number.isFinite(entryPrice) || entryPrice <= 0) return alert('買入價錯誤');
      if(!Number.isFinite(currentPrice) || currentPrice <= 0) return alert('收盤現價錯誤');
      if(state.positions.some(p => p.symbol === symbol && p.isOpen)) return alert('此股票已在持倉監控中');

      const initialStop = Number((entryPrice * 0.97).toFixed(2));
      const takeProfit = Number((entryPrice * 1.05).toFixed(2));

      state.positions.push({
        id:`pos_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
        symbol,
        name:'',
        entryPrice,
        shares,
        boardLots: Math.floor(shares / 1000),
        oddLots: shares % 1000,
        entryDate: nowString(),
        currentPrice,
        highestPrice: Math.max(entryPrice, currentPrice),
        lastClose: currentPrice,
        initialStop,
        trailingStop: initialStop,
        takeProfitRef: takeProfit,
        rr: calcRR(entryPrice, initialStop, takeProfit),
        invested: entryPrice * shares,
        status:'手動監控',
        note:'manual',
        isOpen:true,
        isOrdered:false

      $('holdSymbol').value = top.symbol || '';

    function getTrailingInfo(position){
      const entry = num(position.entryPrice);
      const current = num(position.currentPrice);
      const highest = Math.max(num(position.highestPrice), current);
      const trailing = num(position.trailingStop);
      const pnlPct = entry > 0 ? ((current - entry) / entry) * 100 : 0;
      const highPnlPct = entry > 0 ? ((highest - entry) / entry) * 100 : 0;
      const stopGapPct = current > 0 ? ((current - trailing) / current) * 100 : 0;
      return { pnlPct, highPnlPct, stopGapPct, current, highest, trailing };
    }
    function updateTrailingStop(position){
      const entry = num(position.entryPrice), initialStop = num(position.initialStop), currentPrice = num(position.currentPrice);
      const highestPrice = Math.max(num(position.highestPrice), currentPrice);
      const highPnl = ((highestPrice - entry) / entry) * 100;
      let stopPct = -5, status = '初始防守';
      if(highPnl >= 20){ stopPct = 15; status = '鎖定 +15% 獲利'; }
      else if(highPnl >= 15){ stopPct = 10; status = '鎖定 +10% 獲利'; }
      else if(highPnl >= 10){ stopPct = 5; status = '鎖定 +5% 獲利'; }
      else if(highPnl >= 5){ stopPct = 0; status = '保本防守'; }
      const stepStop = entry * (1 + stopPct / 100);
      const followStop = highestPrice >= entry * 1.20 ? highestPrice * 0.92 : stepStop;
      const newStop = Math.max(num(position.trailingStop, initialStop), stepStop, followStop, initialStop);
      if(currentPrice <= newStop) status = '🔴 明日必須平倉撤退';
      else if(newStop > entry * 1.10) status = '強勢鎖利';
      else if(newStop > entry) status = status.includes('鎖定') ? status : '趨勢鎖利';
      position.highestPrice = highestPrice;
      position.trailingStop = Number(newStop.toFixed(2));
      position.status = status;
    }
    function updatePositionMarket(positionId){
      const p = state.positions.find(x => x.id === positionId && x.isOpen);
      if(!p) return;
      const promptVal = prompt(`[夜間重算] 更新 ${p.symbol} 今日「收盤現價」：\n(若欲同時輸入最高價，請用逗號隔開，例如: 100,105)`, p.currentPrice);
      if(promptVal === null) return;
      
      let val_cur, val_hi;
      if(promptVal.includes(',')){
          const parts = promptVal.split(',');
          val_cur = num(parts[0]);
          val_hi = num(parts[1]);
      } else {
          val_cur = num(promptVal);
          val_hi = val_cur;
      }

      if(!val_cur) return alert('輸入格式錯誤');
      
      p.currentPrice = val_cur;
      p.lastClose = val_cur;
      p.highestPrice = Math.max(p.highestPrice, val_hi || 0, val_cur);
      p.isOrdered = false;

      updateTrailingStop(p);
      saveState();
    }

    function getPerformance(){
      const logs = state.logs;
      const totalTrades = logs.length;
      const wins = logs.filter(x => x.result === 'win').length;
      const losses = logs.filter(x => x.result === 'loss').length;
      const winRate = totalTrades > 0 ? (wins / totalTrades) * 100 : 0;
      const totalPnl = logs.reduce((sum,x)=>sum+num(x.pnl),0);
      const avgPnl = totalTrades > 0 ? totalPnl / totalTrades : 0;
      const avgReturn = totalTrades > 0 ? logs.reduce((s,x)=>s+num(x.returnPct),0) / totalTrades : 0;
      const flywheel = logs.reduce((acc,t)=>acc * (1 + num(t.returnPct)/100),1);
      const flywheelPct = logs.length ? (flywheel - 1) * 100 : 0;
      return { totalTrades, wins, losses, winRate, totalPnl, avgPnl, avgReturn, flywheelPct };
    }

        state.risk.dailyRiskPercent = num($('dailyRiskPercentInput').value);
        state.risk.singlePositionCapitalPercent = num($('singlePositionCapitalPercentInput').value);
        state.risk.maxNewPositions = Math.max(1, num($('maxNewPositionsInput').value, 1));
        state.risk.lossStreak = Math.max(0, num($('lossStreakInput').value, 0));
        if(state.candidates.length){ state.candidatesRawText = $('candidateTextarea').value; parseTradingViewCsv(); return; }
        saveState();
      });
      $('parseCandidatesBtn').addEventListener('click', () => { state.candidatesRawText = $('candidateTextarea').value; parseTradingViewCsv(); });
      $('clearCandidatesBtn').addEventListener('click', () => { state.candidatesRawText = ''; state.candidates = []; saveState(); });
      $('resetAllBtn').addEventListener('click', () => { if(!confirm('確定重置全部資料？這會清空持倉、歷史紀錄、候選、設定。')) return; state = clone(defaultState); saveState(); });
      
      $('addHoldBtn').addEventListener('click', addManualHolding);
      $('loadTopBtn').addEventListener('click', loadTopCandidate);
      
      $('confirmCloseBtn').addEventListener('click', confirmClosePosition);
      $('cancelCloseBtn').addEventListener('click', () => {
        state.pendingCloseId = null;
        $('closeOverlay').classList.remove('show');
      });
      $('closeOverlay').addEventListener('click', (e) => {
        if(e.target === $('closeOverlay')) {
            state.pendingCloseId = null;
            $('closeOverlay').classList.remove('show');
        }
      });
    }

    window.toggleOrder = (id) => {
      const p = state.positions.find(x => x.id === id);
      if(p) p.isOrdered = !p.isOrdered;
      saveState();
    };

    window.openClose = (id) => {
      const p = state.positions.find(x => x.id === id && x.isOpen);
      if(!p) return;
      state.pendingCloseId = id;
      $('closeInfo').textContent = `${p.symbol}｜明日停損價 ${p.trailingStop.toFixed(2)}`;
      $('closePrice').value = p.currentPrice;
      $('closeOverlay').classList.add('show');
    };

    function confirmClosePosition() {
      const id = state.pendingCloseId;
      const p = state.positions.find(x => x.id === id && x.isOpen);
      if(!p) {
          state.pendingCloseId = null;
          $('closeOverlay').classList.remove('show');
          return;
      }
      
      const exitPrice = num($('closePrice').value);
      if(!exitPrice) return alert('價格錯誤');

      const s = Number(p.shares) || 1000;
      const pnlAmt = (exitPrice - p.entryPrice) * s;
      const returnPct = p.entryPrice > 0 ? (exitPrice - p.entryPrice) / p.entryPrice * 100 : 0;
      const result = pnlAmt > 0 ? "win" : (pnlAmt < 0 ? "loss" : "flat");

      state.logs.unshift({
        id: `log_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
        symbol: p.symbol, entryDate: p.entryDate, exitDate: nowString(), entryPrice: p.entryPrice,
        exitPrice, shares: s, pnl: pnlAmt, returnPct, highestPrice: p.highestPrice, trailingStop: p.trailingStop, result,
        reason: $('closeReason').value
      });

      p.isOpen = false; p.exitPrice = exitPrice; p.exitDate = nowString(); p.status = "已出場";
      if(result === "loss") state.risk.lossStreak += 1;
      else if(result === "win") state.risk.lossStreak = 0;
      
      state.pendingCloseId = null;
      saveState();
      $('closeOverlay').classList.remove('show');
    }

    function saveMarketInputs(){
      state.market.advancers = num($('advancersInput').value);
      state.market.decliners = num($('declinersInput').value);
      state.market.limitUp = num($('limitUpInput').value);
      state.market.limitDown = num($('limitDownInput').value);
      state.market.otcChange = num($('otcChangeInput').value);
      state.market.taiexChange = num($('taiexChangeInput').value);
      saveState();
    }

    bindEvents();
    calculateMarket();
    renderAll();
  </script>
</body>
</html>
