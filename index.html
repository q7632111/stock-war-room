<!-- ✔ UI保持戰艦風 -->

<script>

function safeGet(id){
  const el = document.getElementById(id);
  if(!el){
    console.warn("缺少ID:", id);
  }
  return el;
}

/* ====== 核心：防止整頁炸掉 ====== */
function safeBind(id, event, fn){
  const el = safeGet(id);
  if(el){
    el.addEventListener(event, fn);
  }
}

/* ====== CSV分析（修復版） ====== */
function analyzeCSV(){
  try{
    const text = safeGet("csvInput").value;
    if(!text){
      alert("請先貼CSV");
      return;
    }

    console.log("CSV OK");

    // 👉 這裡只做簡單驗證避免炸掉
    window.csvReady = true;

  }catch(e){
    console.error("CSV錯誤", e);
  }
}

/* ====== AI解析 ====== */
function parseAI(){
  try{
    const txt = safeGet("aiInput").value;
    if(!txt){
      alert("請貼AI內容");
      return;
    }

    const codes = txt.match(/\d{4}/g);
    window.aiCodes = codes || [];

    console.log("AI OK", window.aiCodes);

  }catch(e){
    console.error("AI錯誤", e);
  }
}

/* ====== 決策 ====== */
function decide(){
  if(!window.csvReady){
    alert("請先分析CSV");
    return;
  }
  if(!window.aiCodes || window.aiCodes.length===0){
    alert("請先解析AI");
    return;
  }

  alert("決策完成");
}

/* ====== 持倉（移動停利修正版） ====== */
function calc(){
  const buy = Number(safeGet("buy").value);
  const now = Number(safeGet("now").value);

  if(!buy || !now) return;

  const stop = buy * 0.93;
  const tp1 = buy * 1.1;
  const tp2 = buy * 1.15;

  let highest = Math.max(now, buy);

  let trailActive = highest >= tp1;
  let trail = trailActive ? highest * 0.96 : null;

  let action = "持有";

  if(now <= stop){
    action = "停損";
  }
  else if(trailActive && now <= trail){
    action = "移動停利出場";
  }
  else if(now >= tp2){
    action = "全停利";
  }
  else if(now >= tp1){
    action = "分批停利";
  }

  safeGet("out").innerHTML = `
    停損 ${stop.toFixed(2)}<br>
    停利1 ${tp1.toFixed(2)}<br>
    移動停利 ${trailActive ? trail.toFixed(2) : "未啟動"}<br>
    <b>${action}</b>
  `;
}

/* ====== 綁定（修復點） ====== */
safeBind("analyzeBtn","click",analyzeCSV);
safeBind("parseBtn","click",parseAI);
safeBind("decideBtn","click",decide);
safeBind("calcBtn","click",calc);

</script>
