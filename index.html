<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戰艦 Pro Max</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
}
.container{
  padding:16px;
}
.card{
  background:#111827;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
}
.kpi{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}
.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#facc15}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h3>📊 持倉監控</h3>

<input id="buy" placeholder="買入價">
<input id="current" placeholder="目前價">

<button onclick="calc()">計算</button>

<div id="result"></div>
</div>

</div>

<script>

function calc(){
  const buy = Number(document.getElementById("buy").value);
  const current = Number(document.getElementById("current").value);

  if(!buy || !current) return;

  const stop = buy * 0.93;
  const tp1 = buy * 1.1;
  const tp2 = buy * 1.15;

  let highest = Math.max(current, buy);

  let trailActive = highest >= tp1;

  let trail = trailActive ? highest * 0.96 : null;

  let action = "持有";
  let color = "green";

  if(current <= stop){
    action = "停損出場";
    color = "red";
  }
  else if(current >= tp2){
    action = "全數停利";
  }
  else if(trailActive && current <= trail){
    action = "移動停利出場";
    color = "yellow";
  }
  else if(current >= tp1){
    action = "分批停利";
    color = "yellow";
  }

  document.getElementById("result").innerHTML = `
    <div class="kpi"><span>停損價</span><span>${stop.toFixed(2)}</span></div>
    <div class="kpi"><span>停利1</span><span>${tp1.toFixed(2)}</span></div>
    <div class="kpi"><span>停利2</span><span>${tp2.toFixed(2)}</span></div>
    <div class="kpi"><span>移動停利</span><span>${trailActive ? trail.toFixed(2) : "未啟動"}</span></div>
    <div class="kpi"><span>動作</span><span class="${color}">${action}</span></div>
  `;
}

</script>

</body>
</html>
