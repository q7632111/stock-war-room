<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AI戰艦 Pro Max v4.9</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0a0f1c,#05070d);
  color:#e6f1ff;
}

.container{padding:15px;}

.card{
  background:rgba(255,255,255,0.04);
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 0 25px rgba(0,200,255,0.15);
}

.title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

.btn{
  background:#00c8ff;
  border:none;
  padding:10px;
  border-radius:10px;
  width:100%;
  font-weight:bold;
}

textarea{
  width:100%;
  border-radius:10px;
  padding:10px;
  background:#111;
  color:white;
}

.rankS{color:#00ffe1;font-size:18px;}
.rankA{color:#6cff6c;}
.rankB{color:#ffaa00;}
.rankD{color:#ff4444;}

.hud{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.hudBox{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<div class="title">📊 CSV匯入</div>
<textarea id="csv" rows="6"></textarea>
<button class="btn" onclick="analyze()">🚀 啟動戰艦分析</button>
</div>

<div class="card">
<div class="title">🧠 市場戰況（自動判斷）</div>
<div class="hud">
<div class="hudBox" id="marketState">-</div>
<div class="hudBox" id="avgRSI">-</div>
<div class="hudBox" id="avgVol">-</div>
</div>
</div>

<div class="card">
<div class="title">🏆 戰艦選股</div>
<div id="result"></div>
</div>

<div class="card">
<div class="title">🎯 今日作戰命令</div>
<div id="command"></div>
</div>

</div>

<script>

function parseCSV(t){
let r=t.trim().split("\n");
let d=[];
for(let i=1;i<r.length;i++){
let c=r[i].split(",");
d.push({
code:c[0],
name:c[1],
price:+c[2],
vol:+c[6],
sma20:+c[16],
rsi:+c[18]
});
}
return d;
}

function calcMarket(data){
let avgRSI=data.reduce((a,b)=>a+b.rsi,0)/data.length;
let avgVol=data.reduce((a,b)=>a+b.vol,0)/data.length;

let state="⚡中性";
if(avgRSI>65 && avgVol>2) state="🔥強勢";
if(avgRSI<55) state="🛡弱勢";

return {avgRSI,avgVol,state};
}

function getRank(dev,score,market){
if(market=="🔥強勢"){
if(dev<13 && score>20)return "S";
if(dev<16)return "A";
if(dev<18)return "B";
return "D";
}

if(market=="🛡弱勢"){
if(dev<10 && score>20)return "S";
if(dev<13)return "A";
if(dev<15)return "B";
return "D";
}

if(dev<12 && score>20)return "S";
if(dev<15)return "A";
if(dev<18)return "B";
return "D";
}

function getScore(r){
let s=0;
if(r.vol>2)s+=10;
if(r.rsi>60)s+=10;
if(r.rsi>70)s+=5;
return s;
}

function getPosition(rank,market){
if(market=="🔥強勢"){
if(rank=="S")return "100%";
if(rank=="A")return "80%";
if(rank=="B")return "40%";
}

if(market=="🛡弱勢"){
if(rank=="S")return "70%";
if(rank=="A")return "40%";
if(rank=="B")return "0%";
}

if(rank=="S")return "100%";
if(rank=="A")return "70%";
if(rank=="B")return "30%";

return "0%";
}

function analyze(){
let text=document.getElementById("csv").value;
let data=parseCSV(text);

let m=calcMarket(data);

document.getElementById("marketState").innerHTML=m.state;
document.getElementById("avgRSI").innerHTML="RSI:"+m.avgRSI.toFixed(1);
document.getElementById("avgVol").innerHTML="量能:"+m.avgVol.toFixed(2);

let out="";
let best=null;

data.forEach(r=>{
let dev=(r.price-r.sma20)/r.sma20*100;
let score=getScore(r);
let rank=getRank(dev,score,m.state);
let pos=getPosition(rank,m.state);

let cls="rank"+rank;

if(rank=="S" && !best) best=r;

out+=`
<div class="card">
<div class="${cls}">${rank}級 ${r.code} ${r.name}</div>
乖離:${dev.toFixed(1)}%<br>
RSI:${r.rsi}<br>
量能:${r.vol}<br>
建議倉位:${pos}
</div>
`;
});

document.getElementById("result").innerHTML=out;

if(best){
document.getElementById("command").innerHTML=
`👉 主攻 ${best.code} ${best.name}<br>
停損 -7%<br>
停利 10% / 15%`;
}else{
document.getElementById("command").innerHTML=
"👉 今日防守（不進場）";
}

}

</script>

</body>
</html>
