<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 戰艦 Pro Max v4.9 共振版</title>

<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;margin:0}
.container{padding:16px}
.card{background:#111827;border-radius:12px;padding:12px;margin-bottom:12px}
.title{color:#00eaff;margin-bottom:8px}

textarea{width:100%;height:120px;background:#000;color:#0f0}
button{width:100%;padding:10px;margin-top:8px;background:#00eaff;border:none;border-radius:8px}

.stock{display:flex;justify-content:space-between;padding:6px;border-bottom:1px solid #222}

.badge{padding:2px 6px;border-radius:6px}
.Splus{background:#00ffe1;color:#000}
.A{background:#4caf50}
.B{background:#ff9800}
.D{background:#f44336}

.lock{color:red}
.warn{color:orange}
</style>
</head>

<body>
<div class="container">

<div class="card">
<div class="title">CSV</div>
<textarea id="csv"></textarea>
<button onclick="analyze()">開始分析</button>
</div>

<div class="card">
<div class="title">AI輸入（貼AI選股）</div>
<textarea id="ai"></textarea>
<button onclick="parseAI()">解析AI</button>
</div>

<div class="card">
<div class="title">排名</div>
<div id="rank"></div>
</div>

<div class="card">
<div class="title">最終決策</div>
<div id="final"></div>
<button onclick="decision()">一鍵決策</button>
</div>

</div>

<script>

let data=[]
let aiList=[]

// ===== CSV =====
function analyze(){
  let rows=csv.value.split('\n').slice(1)

  data=rows.map(r=>{
    let c=r.split(',')
    let price=parseFloat(c[2])
    let vol=parseFloat(c[6])
    let sma20=parseFloat(c[17])
    let rsi=parseFloat(c[19])
    let dev=((price-sma20)/sma20)*100

    return{code:c[0],name:c[1],price,vol,sma20,rsi,dev}
  })

  data.forEach(r=>{
    r.lock=r.dev>15
    r.score=score(r)
  })

  render()
}

// ===== AI解析 =====
function parseAI(){
  let txt=ai.value
  let codes=txt.match(/\d{4}/g)||[]

  aiList=codes
}

// ===== 評分 =====
function score(r){
  let s=0
  if(r.dev<5)s+=30
  else if(r.dev<10)s+=20
  else if(r.dev<15)s+=10
  else s-=30

  if(r.rsi<70)s+=20
  if(r.vol>2)s+=20

  return s
}

// ===== 排名 =====
function render(){
  data.sort((a,b)=>b.score-a.score)

  rank.innerHTML=data.map(r=>`
  <div class="stock">
    <div>${r.code} ${r.name}</div>
    <div>
      ${r.lock?'<span class="lock">🚨</span>':''}
    </div>
  </div>`).join('')
}

// ===== 決策 =====
function decision(){

  let picks=data.filter(r=>!r.lock)

  picks.forEach(r=>{
    let inAI=aiList.includes(r.code)

    if(inAI && !r.lock){
      r.final="S+"
      r.priority=3
    }
    else if(!r.lock){
      r.final="A"
      r.priority=2
    }
    else if(inAI){
      r.final="B"
      r.priority=1
    }
    else{
      r.final="D"
      r.priority=0
    }
  })

  picks.sort((a,b)=>b.priority-a.priority)

  let top=picks.slice(0,2)

  let html=""

  top.forEach(r=>{
    let warn=""
    if(aiList.includes(r.code) && r.priority<3){
      warn="⚠️ AI與量化不一致"
    }

    html+=`
    <div>
    ${r.code} ${r.name}
    <span class="badge ${r.final=='S+'?'Splus':r.final}">
    ${r.final}
    </span>
    ${warn}
    </div>`
  })

  final.innerHTML=html
}

</script>
</body>
</html>
