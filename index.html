<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 指揮官戰情室 V6</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:#e2e8f0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

.section{
  background:#111827;
  padding:15px;
  border-radius:16px;
  margin-bottom:15px;
}

.title{font-size:26px;font-weight:bold;margin-bottom:10px}

.big{font-size:22px;font-weight:bold}

.green{color:#4ade80}
.yellow{color:#facc15}
.red{color:#f87171}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:#fff;
  margin-top:5px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  width:100%;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#020617;
  border-radius:14px;
  padding:12px;
}

.stat{
  background:#111827;
  padding:8px;
  border-radius:8px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🚀 AI 指揮官戰情室</div>

<!-- ===== 今日指令 ===== -->
<div class="section">
<div class="big" id="command">📌 今日指令：等待資料</div>
</div>

<!-- ===== 選股 ===== -->
<div class="section">
<h3>📊 CSV選股</h3>
<textarea id="csv" rows="4"></textarea>
<button onclick="analyze()">分析</button>
<div id="local"></div>
</div>

<!-- ===== AI ===== -->
<div class="section">
<h3>🤖 AI覆蓋</h3>
<textarea id="ai" rows="4"></textarea>
<button onclick="parseAI()">解析</button>
<div id="aiRes"></div>
</div>

<!-- ===== 決策 ===== -->
<div class="section">
<h3>🧠 決策核心</h3>
<button onclick="decide()">一鍵決策</button>
<div id="decision"></div>
<div id="radar"></div>
</div>

<!-- ===== 持倉 ===== -->
<div class="section">
<h3>📈 持倉監控</h3>

<div class="grid">
<input id="symbol" placeholder="股票">
<input id="buy" type="number" placeholder="買入價">
<input id="current" type="number" placeholder="現價">
</div>

<button onclick="add()">加入</button>

<div id="cards" class="cards"></div>
</div>

</div>

<script>

let localPick=[], aiPick=[], finalPick=[], positions=[]

// ===== CSV =====
function analyze(){
  const rows=document.getElementById("csv").value.split("\n").slice(1)

  localPick = rows.map(r=>{
    let c=r.split(",")
    return {symbol:c[0],vol:parseFloat(c[6])||0}
  }).sort((a,b)=>b.vol-a.vol).slice(0,2)

  document.getElementById("local").innerText="本地："+localPick.map(x=>x.symbol)
}

// ===== AI =====
function parseAI(){
  const txt=document.getElementById("ai").value
  const m=txt.match(/\d{4}/g)
  aiPick=m?[...new Set(m)].slice(0,2):[]
  document.getElementById("aiRes").innerText="AI："+aiPick
}

// ===== 決策 =====
function decide(){

  const local=localPick.map(x=>x.symbol)

  if(aiPick.length===0){
    finalPick=local
  }else{
    const inter=aiPick.filter(x=>local.includes(x))
    finalPick=inter.length?inter:aiPick
  }

  document.getElementById("decision").innerHTML =
    "<div class='big'>🔥 最終："+finalPick+"</div>"

  // 雷達
  document.getElementById("radar").innerHTML =
    "一致性："+(aiPick.join()==local.join()?"🟢 高":"🟡 分歧")

  updateCommand()
}

// ===== 核心 =====
function core(b,c){

  const stop=b*0.93
  const tp1=b*1.1
  const tp2=b*1.15

  let action="持有",color="green"

  if(c<=stop){action="停損";color="red"}
  else if(c>=tp2){action="全出";color="green"}
  else if(c>=tp1){action="減碼";color="yellow"}

  return {action,color,stop,tp1,tp2}
}

// ===== 指令 =====
function updateCommand(){

  if(positions.length==0){
    document.getElementById("command").innerText="📌 今日指令：等待進場"
    return
  }

  let risk=false

  positions.forEach(p=>{
    if(p.c <= p.b*0.95) risk=true
  })

  if(risk){
    document.getElementById("command").innerHTML="🚨 今日指令：風險控管（減碼/停損）"
  }else{
    document.getElementById("command").innerHTML="🚀 今日指令：持有 / 觀察續強"
  }
}

// ===== 持倉 =====
function add(){
  const s=document.getElementById("symbol").value
  const b=parseFloat(document.getElementById("buy").value)
  const c=parseFloat(document.getElementById("current").value)

  positions.push({s,b,c})
  render()
  updateCommand()
}

function render(){

  const box=document.getElementById("cards")
  box.innerHTML=""

  positions.forEach((p,i)=>{

    const r=core(p.b,p.c)
    const pnl=((p.c-p.b)/p.b*100).toFixed(2)

    box.innerHTML+=`
    <div class="card">
      <div class="big ${r.color}">${r.action}</div>
      <div>${p.s}</div>

      <div class="grid">
        <div class="stat">報酬<br>${pnl}%</div>
        <div class="stat">停損<br>${r.stop.toFixed(1)}</div>
        <div class="stat">停利<br>${r.tp1.toFixed(1)}</div>
        <div class="stat">現價<br>${p.c}</div>
      </div>

      <button onclick="del(${i})">刪除</button>
    </div>`
  })
}

function del(i){
  positions.splice(i,1)
  render()
  updateCommand()
}

</script>

</body>
</html>
