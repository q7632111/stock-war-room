<!-- ⭐ v4.9 真・戰艦升級版（保留UI + 強化邏輯） -->

<script>
// ==========================
// 🔥 v4.9 核心升級模組
// ==========================

// 🧠 分級系統
function getGrade(dev, rsi, vol){
  if(dev < 5 && rsi < 70 && vol > 2) return 'S';
  if(dev < 10 && rsi < 75) return 'A';
  if(dev < 15) return 'B';
  return 'D';
}

// 🚨 鎖單機制
function isLocked(dev){
  return dev > 15;
}

// 📊 評分系統
function scoreRow(r){
  let score = 0;

  if(r.dev < 5) score += 30;
  else if(r.dev < 10) score += 20;
  else if(r.dev < 15) score += 10;
  else score -= 30;

  if(r.rsi < 70) score += 20;
  else if(r.rsi > 80) score -= 20;

  if(r.vol > 2) score += 20;

  return score;
}

// 🌍 市場情緒
function getMarketMode(list){
  if(!list || list.length === 0) return '⚖️ 標準';

  const avgDev = list.reduce((a,b)=>a+b.dev,0)/list.length;

  if(avgDev > 10) return '🔥 強勢';
  if(avgDev > 5) return '⚖️ 標準';
  return '🛡 保守';
}

// 💰 TP/SL 建議
function getTPSL(mode){
  if(mode === '🔥 強勢'){
    return { tp: 0.15, sl: -0.08 };
  }
  if(mode === '⚖️ 標準'){
    return { tp: 0.10, sl: -0.07 };
  }
  return { tp: 0.08, sl: -0.05 };
}

// 🎯 今日指令
function getTodayAction(mode){
  if(mode === '🔥 強勢') return '🚀 主攻模式（可進場）';
  if(mode === '⚖️ 標準') return '⚖️ 選擇性進場';
  return '🛡 防守（減碼/觀察）';
}

// ==========================
// 🔧 插入你原本流程
// ==========================

// 👉 修改 analyzeCSV 內部（加這段）
function enhanceRows(rows){
  return rows.map(r=>{
    r.grade = getGrade(r.dev, r.rsi, r.vol);
    r.lock = isLocked(r.dev);
    r.score = scoreRow(r);
    return r;
  });
}

// 👉 修改最終決策
function enhancedDecision(rows){
  rows = enhanceRows(rows);

  // 排序（用分數）
  rows.sort((a,b)=>b.score - a.score);

  const mode = getMarketMode(rows);
  const tpSl = getTPSL(mode);
  const action = getTodayAction(mode);

  return {
    picks: rows.slice(0,2),
    mode,
    tp: tpSl.tp,
    sl: tpSl.sl,
    action
  };
}

// ==========================
// 🖥 UI 注入（不改你原畫面）
// ==========================

// 👉 在你 renderRankTable 加
function renderLockTag(r){
  if(r.lock){
    return '🚨 <span style="color:red">乖離過大</span>';
  }
  return '';
}

// 👉 在主攻卡顯示
function renderGradeTag(r){
  let color = '#fff';

  if(r.grade === 'S') color = '#00ffcc';
  if(r.grade === 'A') color = '#4caf50';
  if(r.grade === 'B') color = '#ff9800';
  if(r.grade === 'D') color = '#f44336';

  return `<span style="color:${color};font-weight:bold">${r.grade}級</span>`;
}

// 👉 今日指令顯示
function updateTodayPanel(mode, action){
  const el = document.getElementById('todayAction');
  if(el){
    el.innerHTML = `
      <div style="font-size:18px">${mode}</div>
      <div>${action}</div>
    `;
  }
}

// ==========================
// 🚀 主流程 Hook（關鍵）
// ==========================

function runFinalDecision(){
  if(!window.localPicks || localPicks.length === 0){
    alert('請先分析CSV');
    return;
  }

  const result = enhancedDecision(localPicks);

  // 更新UI
  updateTodayPanel(result.mode, result.action);

  console.log('🔥 最終決策', result);
}

// 綁定你的按鈕（如果有）
window.runFinalDecision = runFinalDecision;

</script>
